<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="연주 버스">
  <meta name="theme-color" content="#F7F3EE">
  <title>연주 버스 🚌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #F7F3EE; --bg2: #F0EBE4; --card: #FFFFFF;
      --text-1: #1A1714; --text-2: #8A8278; --text-3: #C4BFBA;
      --blue: #2B6CB0; --blue-bg: #EBF4FF;
      --green: #276749; --green-bg: #F0FFF4;
      --orange: #C05621; --orange-bg: #FFFAF0;
      --red: #C53030; --red-bg: #FFF5F5;
      --gray-bg: #F4F4F4; --border: #E8E2DB;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.05);
      --radius: 18px; --radius-sm: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { background: var(--bg); }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--text-1); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #main-app { max-width: 500px; margin: 0 auto; min-height: 100dvh; padding-bottom: calc(28px + var(--safe-bottom)); }

    .header { padding: calc(20px + var(--safe-top)) 20px 0; display: flex; align-items: flex-start; justify-content: space-between; }
    .app-name { font-size: 11px; font-weight: 700; color: #B5537A; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .app-title { font-size: 23px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
    .last-updated { font-size: 11px; color: var(--text-3); margin-top: 5px; }
    .header-actions { margin-top: 2px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); font-size: 17px; transition: transform 0.1s; color: var(--text-1); }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn.spinning { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar { display: flex; align-items: center; gap: 6px; padding: 10px 20px 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.ok      { background: var(--green); animation: pulse-dot 2.5s ease-in-out infinite; }
    .status-dot.error   { background: var(--red); }
    .status-dot.loading { background: var(--orange); animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-label { font-size: 11px; color: var(--text-3); }

    .tabs-wrapper { padding: 14px 20px 0; }
    .tabs { display: flex; gap: 6px; background: var(--bg2); border-radius: 14px; padding: 4px; }
    .tab-btn { flex: 1; padding: 10px 8px; border: none; border-radius: 11px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.22s ease; letter-spacing: -0.2px; }
    .tab-btn.active   { background: var(--card); color: var(--text-1); box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.06); }
    .tab-btn.inactive { background: transparent; color: var(--text-2); }

    .section-header { display: flex; align-items: center; gap: 7px; padding: 16px 20px 0; }
    .section-pin  { font-size: 12px; flex-shrink: 0; }
    .section-name { font-size: 12px; font-weight: 700; color: var(--text-1); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section-id   { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
    .section-divider { height: 1px; background: var(--border); margin: 14px 20px 0; }

    .bus-list { padding: 10px 20px 0; display: flex; flex-direction: column; gap: 10px; }

    .bus-card { background: var(--card); border-radius: var(--radius); padding: 16px 16px 14px; box-shadow: var(--shadow-sm); animation: fadeUp 0.28s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .bus-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .bus-number { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .bus-badge  { font-size: 10.5px; font-weight: 600; padding: 4px 10px; border-radius: 30px; }
    .badge-running { background: var(--green-bg); color: var(--green); }
    .badge-stopped { background: var(--gray-bg); color: var(--text-3); }

    .arrival-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .arrival-cell { border-radius: 12px; padding: 11px 12px 10px; }
    .arrival-cell-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; opacity: 0.5; }
    .arrival-cell-mins  { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.1; }
    .arrival-cell-clock { font-size: 11.5px; font-weight: 500; margin-top: 3px; opacity: 0.7; }
    .arrival-cell-loc   { font-size: 10.5px; margin-top: 3px; opacity: 0.55; }
    .lowfloor-tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; color: var(--blue); background: var(--blue-bg); border-radius: 4px; padding: 2px 6px; margin-top: 5px; }

    .urg-imminent { background: var(--red-bg);   color: var(--red);    }
    .urg-soon     { background: var(--orange-bg); color: var(--orange); }
    .urg-normal   { background: var(--blue-bg);   color: var(--blue);   }
    .urg-far      { background: var(--bg);        color: var(--text-2); }
    .urg-none     { background: var(--gray-bg);   color: var(--text-3); }

    .loading-state { padding: 50px 0; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--text-2); border-radius: 50%; animation: spin 0.75s linear infinite; }
    .loading-label { font-size: 13px; color: var(--text-2); }

    .empty-state { padding: 40px 20px; text-align: center; }
    .empty-emoji { font-size: 36px; display: block; margin-bottom: 10px; }
    .empty-msg   { font-size: 13.5px; color: var(--text-2); line-height: 1.6; }

    .error-state { background: #FFF8F8; border-radius: var(--radius); padding: 22px; text-align: center; border: 1px solid #FFE4E4; margin: 14px 20px 0; }
    .error-emoji { font-size: 28px; margin-bottom: 8px; }
    .error-msg   { font-size: 13px; color: var(--red); line-height: 1.6; }
    .error-hint  { font-size: 12px; color: var(--text-2); margin-top: 8px; line-height: 1.5; }
    .retry-btn   { margin-top: 14px; padding: 9px 20px; background: var(--text-1); color: white; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }

    .footer { padding: 18px 20px 0; text-align: center; }
    .footer-note { font-size: 11.5px; color: var(--text-3); }
  </style>
</head>
<body>
<div id="main-app">

  <div class="header">
    <div class="header-left">
      <div class="app-name">연주 버스 🩷</div>
      <div class="app-title">실시간 도착 정보</div>
      <div class="last-updated" id="last-updated">–</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" onclick="refreshData()">↻</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <div class="status-label" id="status-label">연결 중...</div>
  </div>

  <div class="tabs-wrapper">
    <div class="tabs">
      <button class="tab-btn active"   id="tab-morning" onclick="switchTab('morning')">☀️ 출근</button>
      <button class="tab-btn inactive" id="tab-evening" onclick="switchTab('evening')">🌙 퇴근</button>
    </div>
  </div>

  <div id="content-area"></div>

  <div class="footer">
    <div class="footer-note">30초마다 자동 갱신 · 경기도 버스정보 시스템</div>
  </div>
</div>

<script>
const STATIONS = {
  morning: [
    { displayName: '광교더리브.힐스테이트레이크',    arsId: '04378', keyword: '광교더리브',    stationId: null, cacheKey: 'sid_m1' },
    { displayName: '광교센트럴뷰.힐스테이트레이크', arsId: '04290', keyword: '광교센트럴뷰', stationId: null, cacheKey: 'sid_m2' },
  ],
  evening: [
    { displayName: '광교중앙.경기도청.아주대역환승센터', arsId: '04397', keyword: '광교중앙', stationId: null, cacheKey: 'sid_e1' },
  ]
};

const REFRESH_MS = 30000;
let currentTab = 'morning';
let refreshTimer = null;

async function apiFetch(params) {
  const qs = new URLSearchParams(params).toString();
  const r = await fetch('/api/bus?' + qs);
  if (!r.ok) throw new Error('서버 오류 (' + r.status + ')');
  return r.json();
}

async function getStationId(station) {
  if (station.stationId) return station.stationId;
  const cached = sessionStorage.getItem(station.cacheKey);
  if (cached) { station.stationId = cached; return cached; }

  const data = await apiFetch({ type: 'station', keyword: station.keyword });
  const raw  = data && data.response && data.response.msgBody && data.response.msgBody.busStationList;
  if (!raw) throw new Error('정류장 정보를 찾을 수 없어요. BUS_API_KEY를 확인해 주세요.');

  const list  = Array.isArray(raw) ? raw : [raw];
  const match = list.find(function(x){ return String(x.stationNo) === String(station.arsId); }) || list[0];
  if (!match) throw new Error('정류장 매칭 실패 (' + station.arsId + ')');

  station.stationId = String(match.stationId);
  sessionStorage.setItem(station.cacheKey, station.stationId);
  return station.stationId;
}

async function fetchArrivals(stationId) {
  const data = await apiFetch({ type: 'arrival', stationId: stationId });
  const raw  = data && data.response && data.response.msgBody && data.response.msgBody.busArrivalList;
  if (!raw) return [];
  return Array.isArray(raw) ? raw : [raw];
}

async function loadData() {
  setStatus('loading', '업데이트 중...');
  showLoading();
  const stationList = STATIONS[currentTab];
  try {
    const results = await Promise.all(
      stationList.map(async function(station) {
        const sid  = await getStationId(station);
        const list = await fetchArrivals(sid);
        return { station: station, list: list };
      })
    );
    renderAll(results);
    setStatus('ok', '실시간 · ' + (REFRESH_MS / 1000) + '초마다 자동갱신');
    setTime();
  } catch(e) {
    showError(e.message);
    setStatus('error', '연결 오류');
  }
}

function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  loadData().finally(function(){ setTimeout(function(){ btn.classList.remove('spinning'); }, 600); });
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-morning').className = 'tab-btn ' + (tab === 'morning' ? 'active' : 'inactive');
  document.getElementById('tab-evening').className = 'tab-btn ' + (tab === 'evening' ? 'active' : 'inactive');
  clearInterval(refreshTimer);
  loadData();
  refreshTimer = setInterval(loadData, REFRESH_MS);
}

function showLoading() {
  document.getElementById('content-area').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><div class="loading-label">버스 정보 불러오는 중...</div></div>';
}

function showError(msg) {
  document.getElementById('content-area').innerHTML =
    '<div class="error-state"><div class="error-emoji">⚠️</div><div class="error-msg">' + esc(msg) + '</div>' +
    '<div class="error-hint">Vercel → Settings → Environment Variables 에서<br><strong>BUS_API_KEY</strong>가 설정되어 있는지 확인해 주세요.</div>' +
    '<button class="retry-btn" onclick="loadData()">다시 시도</button></div>';
}

function renderAll(results) {
  var isMulti = results.length > 1;
  var html = '';
  results.forEach(function(r, idx) {
    var station = r.station;
    var list    = r.list;

    if (isMulti && idx > 0) html += '<div class="section-divider"></div>';

    html += '<div class="section-header">' +
      '<span class="section-pin">📍</span>' +
      '<span class="section-name">' + esc(station.displayName) + '</span>' +
      '<span class="section-id">#' + station.arsId + '</span>' +
      '</div>';

    if (!list || list.length === 0) {
      html += '<div class="bus-list"><div class="empty-state"><span class="empty-emoji">🌙</span>' +
              '<div class="empty-msg">도착 예정 버스가 없어요.</div></div></div>';
      return;
    }

    var sorted = list.slice().sort(function(a, b) {
      var as = a.flag === 'STOP', bs = b.flag === 'STOP';
      if (as !== bs) return as ? 1 : -1;
      return (parseInt(a.predictTime1) || 999) - (parseInt(b.predictTime1) || 999);
    });

    html += '<div class="bus-list">';
    sorted.forEach(function(bus, i) {
      var running = bus.flag !== 'STOP';
      var t1 = running ? parseMin(bus.predictTime1) : null;
      var t2 = running ? parseMin(bus.predictTime2) : null;
      var l1 = bus.locationNo1 ? parseInt(bus.locationNo1) : null;
      var l2 = bus.locationNo2 ? parseInt(bus.locationNo2) : null;
      html += '<div class="bus-card" style="animation-delay:' + ((idx * 10 + i) * 0.04) + 's">' +
        '<div class="bus-card-header">' +
          '<div class="bus-number">' + esc(bus.routeName || '?') + '</div>' +
          '<div class="bus-badge ' + (running ? 'badge-running' : 'badge-stopped') + '">' + (running ? '운행중' : '운행종료') + '</div>' +
        '</div>' +
        '<div class="arrival-grid">' +
          cell('첫번째 버스', t1, l1, bus.lowPlate1 === '1', running) +
          cell('두번째 버스', t2, l2, bus.lowPlate2 === '1', running) +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });

  document.getElementById('content-area').innerHTML = html;
}

function cell(label, m, loc, isLow, running) {
  var urg   = running ? urgClass(m) : 'urg-none';
  var fmt   = running ? fmtTime(m) : { mins: '–', clock: '' };
  var locS  = (running && loc && loc > 0) ? '<div class="arrival-cell-loc">' + loc + '번째 전</div>' : '';
  var lowT  = (running && isLow && m !== null) ? '<div class="lowfloor-tag">♿ 저상</div>' : '';
  var clkS  = fmt.clock ? '<div class="arrival-cell-clock">' + fmt.clock + ' 도착</div>' : '';
  return '<div class="arrival-cell ' + urg + '">' +
    '<div class="arrival-cell-label">' + label + '</div>' +
    '<div class="arrival-cell-mins">'  + fmt.mins + '</div>' +
    clkS + locS + lowT +
  '</div>';
}

function urgClass(m) {
  if (m === null) return 'urg-none';
  if (m <= 1)  return 'urg-imminent';
  if (m <= 5)  return 'urg-soon';
  if (m <= 20) return 'urg-normal';
  return 'urg-far';
}

function fmtTime(m) {
  if (m === null) return { mins: '–', clock: '' };
  if (m === 0)    return { mins: '곧 도착 🚌', clock: '' };
  var d    = new Date(Date.now() + m * 60000);
  var hh   = d.getHours();
  var mm   = String(d.getMinutes()).padStart(2, '0');
  var ampm = hh >= 12 ? '오후' : '오전';
  var h12  = hh % 12 || 12;
  return { mins: m + '분 후', clock: ampm + ' ' + h12 + ':' + mm };
}

function parseMin(v) { var n = parseInt(v); return isNaN(n) ? null : n; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-label').textContent = msg;
}

function setTime() {
  var d = new Date();
  var pad = function(n){ return String(n).padStart(2,'0'); };
  document.getElementById('last-updated').textContent =
    pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + ' 기준';
}

switchTab('morning');
</script>
</body>
</html>
